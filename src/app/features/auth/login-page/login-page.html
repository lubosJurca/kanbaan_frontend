<div class="min-h-screen flex items-center justify-center bg-light-bg dark:bg-dark-bg">
  <div class="w-full max-w-md bg-white dark:bg-dark-card rounded-lg shadow-md p-8 mx-4">

    <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-8 text-center tracking-tight">
      kanbaan
    </h1>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

      <!-- Email -->
      <div class="flex flex-col gap-2">
        <label for="email" class="text-xs font-bold text-medium uppercase tracking-widest">
          Email
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="e.g. alex@gmail.com"
          class="w-full border rounded px-4 py-2 text-sm text-gray-900 dark:text-white bg-white dark:bg-dark-card placeholder:text-medium focus:outline-none transition-colors"
          [ngClass]="inputClass('email')"
        />
        @if (hasError('email', 'required')) {
          <p class="text-destructive text-xs font-bold">Can't be empty</p>
        } @else if (hasError('email', 'email')) {
          <p class="text-destructive text-xs font-bold">Invalid email address</p>
        }
      </div>

      <!-- Password -->
      <div class="flex flex-col gap-2">
        <label for="password" class="text-xs font-bold text-medium uppercase tracking-widest">
          Password
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full border rounded px-4 py-2 text-sm text-gray-900 dark:text-white bg-white dark:bg-dark-card placeholder:text-medium focus:outline-none transition-colors"
          [ngClass]="inputClass('password')"
        />
        @if (hasError('password', 'required')) {
          <p class="text-destructive text-xs font-bold">Can't be empty</p>
        } @else if (hasError('password', 'minlength')) {
          <p class="text-destructive text-xs font-bold">Min. 6 characters</p>
        }
      </div>

      <button
        type="submit"
        [disabled]="loginForm.status === 'INVALID' || authStore.isLoading()"
        class="w-full bg-primary hover:bg-primary-light text-white rounded-full px-6 py-3 font-bold text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ authStore.isLoading() ? 'Logging in...' : 'Log In' }}
      </button>

    </form>

    <p class="text-center text-medium text-sm mt-6">
      Don't have an account?
      <a routerLink="/register" class="text-primary font-bold hover:text-primary-light transition-colors">
        Sign up
      </a>
    </p>

  </div>
</div>
